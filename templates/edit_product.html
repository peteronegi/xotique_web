{% extends "base.html" %}

{% block content %}
<section class="admin-form-section" style="padding: 100px 10%;">
    <div class="form-container" style="max-width: 600px; margin: 0 auto; background: #fff; padding: 40px; border: 1px solid var(--brand-gold);">
        <h2 style="font-family: 'Playfair Display'; color: var(--brand-green); text-align: center;">EDIT CURATION</h2>
        
        <div class="current-preview" style="text-align: center; margin-bottom: 30px; padding: 20px; background: #f9f9f9; border-radius: 5px;">
            <p style="font-size: 0.7rem; letter-spacing: 1px; color: #999; margin-bottom: 10px;">CURRENT MEDIA PREVIEW</p>
            {% if hamper.image_url.endswith('.mp4') %}
                <video autoplay muted loop style="width: 100%; max-height: 200px; object-fit: cover;">
                    <source src="{{ url_for('static', filename='images/' + hamper.image_url) }}" type="video/mp4">
                </video>
            {% else %}
                <img src="{{ url_for('static', filename='images/' + hamper.image_url) }}" style="width: 100%; max-height: 200px; object-fit: cover;">
            {% endif %}
        </div>

        <form method="POST" enctype="multipart/form-data">
            <input type="text" name="name" value="{{ hamper.name }}" required style="width:100%; margin-bottom:20px; padding:10px;">
            <input type="text" name="price" value="{{ hamper.price }}" required style="width:100%; margin-bottom:20px; padding:10px;">
            <textarea name="description" style="width:100%; height:100px; margin-bottom:20px; padding:10px;">{{ hamper.description }}</textarea>
            
            <label style="font-size: 0.8rem; color: #999;">REPLACE MEDIA (OPTIONAL):</label>
            <input type="file" name="image" style="margin-bottom:30px;">

            <button type="submit" class="btn-send" style="width:100%;">SAVE CHANGES</button>
            <a href="{{ url_for('products') }}" style="display:block; text-align:center; margin-top:20px; color:#999; text-decoration:none;">Cancel</a>
        </form>
    </div>
</section>
{% endblock %}
